<table class="table">
    <thead>
        <tr>
            <th>Imagen</th>
            <th>Dirección</th>
            <th>Estado</th>
            <th>Precio</th>
            <th>Dimesión</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let depto of deptos">
            <td><img [src]="depto.imagen" [alt]="depto.direccion"></td>
            <td>{{depto.direccion}}</td>
            <td>{{depto.estado}}</td>
            <td>{{depto.precio}}</td>
            <td>{{depto.dimension}}</td>
        </tr>
    </tbody>
</table>
